<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ugyanaz a CSS */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.85)),
                        url('https://images.unsplash.com/photo-1553413077-190dd305871c?q=80&w=1935&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .custom-box {
            background: linear-gradient(10deg, #000000, #3a3a3a);
            padding: 30px; border-radius: 12px; margin: 40px auto; width: 100%; max-width: 550px;
            box-shadow: 0 0 20px #000;
        }
        input { background-color: #2a2a2a !important; color: #fff !important; border: 1px solid #fff !important; }
        label { color: #fff; margin-top: 10px; }
        .btn-dark {
            width: 100%; padding: 12px; margin-top: 20px; background-color: transparent;
            color: #fff; border: 1px solid #fff; font-weight: 700; transition: all 0.3s;
        }
        .btn-dark:hover { background-color: #fff; color: #000; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="custom-box">
            <h1 class="text-white mb-4 text-center">Login</h1>

            <!-- A Login formnál elég a User + Pass -->
            <label class="mt-3">Username:</label>
            <input type="text" id="loginUser" class="form-control" placeholder="Felhasználó név">

            <label class="mt-3">Password:</label>
            <input type="password" id="loginPass" class="form-control" placeholder="Jelszó">

            <button class="btn btn-dark" onclick="handleLogin()">Bejelentkezés</button>

            <div class="text-white mt-3 text-center">
                Nincsen még fiókod? <a href="register.html" class="text-info" style="text-decoration:none">Regisztráció</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const inputUser = document.getElementById('loginUser').value;
            const inputPass = document.getElementById('loginPass').value;

            // Adatok lekérése a "memóriából"
            const storedData = localStorage.getItem('registeredUser');
            
            if(!storedData) {
                alert("Nincs regisztrált felhasználó! Kérlek regisztrálj először.");
                return;
            }

            const validUser = JSON.parse(storedData);

            // Ellenőrzés
            if(inputUser === validUser.username && inputPass === validUser.pass) {
                // Sikeres belépés -> Létrehozunk egy "aktív sessiont"
                localStorage.setItem('currentUser', JSON.stringify(validUser));
                
                // Átirányítás a főoldalra (index.html vagy inventory.html)
                window.location.href = 'mainPage.html'; 
            } else {
                alert("Hibás felhasználónév vagy jelszó!");
            }
        }
    </script>
</body>
</html>
