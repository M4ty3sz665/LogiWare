<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Login</title>
</head>
<body>
    <div class="container">

        <div class="custom-box">
            <h1 class="text-white mb-4 text-center">Login</h1>

            <div class="row">
                <div class="col-md-6">
                    <label>Vezetéknév:</label>
                    <input type="text" class="form-control" placeholder="Dolgozó vezeték neve">
                </div>

                <div class="col-md-6">
                    <label>Keresztnév:</label>
                    <input type="text" class="form-control" placeholder="Dolgozó kereszt neve">
                </div>
            </div>

            <label class="mt-3">E-mail cím:</label>
            <input type="email" class="form-control" placeholder="E-mail cím">

            <label class="mt-3">Username:</label>
            <input type="text" class="form-control" placeholder="Felhasználó név">

            <label class="mt-3">Password:</label>
            <input type="password" class="form-control" placeholder="Jelszó">

            <div class="text-white mt-3 text-center">
                Nincsen még fiókod? <a href="register.html">Kattints ide</a>
            </div>

            <button class="btn btn-dark">Adatok feltöltése</button>
        </div>

    </div>
</body>
</html>
