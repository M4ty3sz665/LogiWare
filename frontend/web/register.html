<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* A korábbi közös CSS kódod ide jön (vagy style.css-ből behúzva) */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.85)),
                        url('https://images.unsplash.com/photo-1553413077-190dd305871c?q=80&w=1935&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .custom-box {
            background: linear-gradient(10deg, #000000, #3a3a3a);
            padding: 30px; border-radius: 12px; margin: 40px auto; width: 100%; max-width: 550px;
            box-shadow: 0 0 20px #000;
        }
        input, select { background-color: #2a2a2a !important; color: #fff !important; border: 1px solid #fff !important; }
        label { color: #fff; margin-top: 10px; }
        .btn-dark {
            width: 100%; padding: 12px; margin-top: 20px; background-color: transparent;
            color: #fff; border: 1px solid #fff; font-weight: 700; transition: all 0.3s;
        }
        .btn-dark:hover { background-color: #fff; color: #000; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="custom-box">
            <h1 class="text-white mb-4 text-center">Regisztráció</h1>

            <div class="row">
                <div class="col-md-6">
                    <label>Vezetéknév:</label>
                    <input type="text" id="regLName" class="form-control" placeholder="Kovács">
                </div>
                <div class="col-md-6">
                    <label>Keresztnév:</label>
                    <input type="text" id="regFName" class="form-control" placeholder="János">
                </div>
            </div>

            <label class="mt-3">E-mail cím:</label>
            <input type="email" id="regEmail" class="form-control" placeholder="pelda@ceg.hu">

            <label class="mt-3">Username:</label>
            <input type="text" id="regUser" class="form-control" placeholder="felhasznalonev">
            
            <label class="mt-3">Password:</label>
            <input type="password" id="regPass" class="form-control" placeholder="Jelszó">

            <label class="mt-3">Dolgozó beosztása</label>
            <select id="regRole" class="form-select">
                <option selected disabled value="">Válassz beosztást...</option>
                <option value="Raktáros">Raktáros</option>
                <option value="Targoncás">Targoncavezető</option>
                <option value="Komissiózó">Komissiózó (Picking)</option>
                <option value="Raktárvezető">Raktárvezető</option>
            </select>

            <button class="btn btn-dark" onclick="handleRegister()">Adatok feltöltése</button>
            
            <div class="text-center mt-3">
                <a href="login.html" class="text-secondary" style="text-decoration:none">Már van fiókod? Belépés</a>
            </div>
        </div>
    </div>

    <script src="register_script.js"></script>
</body>
</html>
